version: 2

sources:
  - name: raw
    description: >
      Raw seed data loaded into Snowflake representing source system extracts
      from the core banking platform. All tables are landed as-is with no
      transformation applied. Data covers customers, transactions, and AML
      alert events.
    database: AML_DB
    schema: raw
    tables:
      - name: raw_customers
        description: >
          Customer master data extract from the core banking CRM. Contains
          KYC status, risk rating, PEP/sanctions flags, and onboarding metadata.
          Updated nightly via full refresh.
        columns:
          - name: customer_id
            description: Unique customer identifier (primary key). Format C###.
            tests:
              - unique
              - not_null
          - name: risk_rating
            description: Customer AML risk rating assigned during KYC. Values LOW, MEDIUM, HIGH.
            tests:
              - not_null
              - accepted_values:
                  values: ['LOW', 'MEDIUM', 'HIGH']
          - name: kyc_status
            description: Current KYC verification status.
            tests:
              - accepted_values:
                  values: ['APPROVED', 'PENDING', 'UNDER_REVIEW', 'REJECTED']
          - name: is_pep
            description: Boolean flag — true if customer is a Politically Exposed Person.
          - name: is_sanctioned
            description: Boolean flag — true if customer appears on a sanctions list.

      - name: raw_transactions
        description: >
          Financial transaction records extracted from the core ledger system.
          Includes retail, business, and wire transfer transactions across all
          channels (branch, online, mobile). Refreshed every 4 hours.
        columns:
          - name: transaction_id
            description: Unique transaction identifier (primary key). Format T###.
            tests:
              - unique
              - not_null
          - name: customer_id
            description: Foreign key to raw_customers.
            tests:
              - not_null
              - relationships:
                  to: source('raw', 'raw_customers')
                  field: customer_id
          - name: amount
            description: Transaction amount in the stated currency. Always positive.
            tests:
              - not_null
          - name: status
            description: Transaction processing status.
            tests:
              - accepted_values:
                  values: ['COMPLETED', 'PENDING', 'FAILED', 'REVERSED']

      - name: raw_aml_alerts
        description: >
          AML alert events generated by the transaction monitoring system (TMS).
          Each alert links to a transaction that triggered a rule. Analysts
          investigate and resolve or escalate alerts. Escalated alerts may result
          in a SAR (Suspicious Activity Report) filed with AUSTRAC.
        columns:
          - name: alert_id
            description: Unique alert identifier (primary key). Format AL###.
            tests:
              - unique
              - not_null
          - name: transaction_id
            description: Foreign key to raw_transactions.
            tests:
              - not_null
          - name: status
            description: Alert investigation status.
            tests:
              - accepted_values:
                  values: ['OPEN', 'CLOSED', 'ESCALATED']
          - name: risk_score
            description: Numeric risk score 0-100 assigned by the TMS rule engine.
